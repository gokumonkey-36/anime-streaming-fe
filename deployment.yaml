apiVersion: v1
kind: Service
metadata:
  name: pc-frontend-svc
spec:
  type: ClusterIP
  selector:
    app: pc-frontend-service
  ports:
    - port: 80
      targetPort: 80

---

apiVersion: apps/v1
kind: Deployment
metadata:
name: pc-frontend-service
spec:
replicas: 2
selector:
  matchLabels:
    app: pc-frontend-service
template:
  metadata:
    labels:
      app: pc-frontend-service
  spec:
    containers:
      - name: pc-frontend-microservice
        image: gokumonkey/pc-frontend-service:1
        imagePullPolicy: Always

        ports:
          - containerPort: 80

        resources:
          requests:
            cpu: "100m"
            memory: "64Mi"
          limits:
            cpu: "250m"
            memory: "128Mi"

        readinessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 5
          periodSeconds: 10

        livenessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 15
          periodSeconds: 20
